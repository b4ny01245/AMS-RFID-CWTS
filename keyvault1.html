<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyVault Inventory</title>
  
  <!-- External Libraries -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-card: #1e293b;
      --accent: #10b981;
      --border: #334155;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
    }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-primary); color: var(--text-main); }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 16px; }
    .btn { padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-secondary { background: #334155; color: white; }
    .btn:hover { opacity: 0.9; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .available { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    .borrowed { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
    
    /* Scanner styling */
    #qr-reader { border-radius: 12px; overflow: hidden; }
    #qr-reader video { border-radius: 12px; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">
  
  <!-- Header -->
  <header class="flex justify-between items-center mb-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
        </svg>
      </div>
      <h1 class="text-xl font-bold">KeyVault</h1>
    </div>
    <div class="text-right">
      <p class="text-sm font-medium" id="userName">Loading...</p>
      <p class="text-xs text-slate-400" id="userEmail"></p>
    </div>
  </header>

  <!-- Main Grid -->
  <div class="grid lg:grid-cols-3 gap-6">
    
    <!-- Left: Scanner & Actions -->
    <div class="lg:col-span-1 space-y-6">
      
      <!-- Scanner Card -->
      <div class="glass p-6">
        <h2 class="text-lg font-semibold mb-4">Scan QR Code</h2>
        
        <div id="scanner-container" class="bg-slate-800 rounded-xl aspect-square flex items-center justify-center relative overflow-hidden">
          <div id="qr-reader" class="w-full h-full absolute inset-0"></div>
          <div id="scanner-placeholder" class="text-center p-8 z-10">
            <svg class="w-12 h-12 mx-auto mb-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
            </svg>
            <p class="text-slate-500 text-sm">Click below to start camera</p>
          </div>
        </div>

        <div class="flex gap-2 mt-4">
          <button id="scanBtn" onclick="toggleScanner()" class="btn btn-primary flex-1">Start Scanner</button>
        </div>

        <!-- Manual Entry -->
        <div class="mt-4 pt-4 border-t border-slate-700">
          <label class="text-xs text-slate-400 block mb-2">Or enter ID manually</label>
          <div class="flex gap-2">
            <input type="text" id="manualId" class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" placeholder="e.g., KEY-001">
            <button onclick="submitManual()" class="btn btn-secondary px-4">Enter</button>
          </div>
        </div>
      </div>

      <!-- Action Modal (Hidden by default) -->
      <div id="actionCard" class="glass p-6 hidden">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h3 class="text-lg font-bold" id="itemName">Item Name</h3>
            <p class="text-xs text-slate-400 mono" id="itemId">ID</p>
          </div>
          <span id="itemStatusBadge" class="status-badge available">Available</span>
        </div>
        
        <p class="text-sm text-slate-300 mb-4" id="itemStatusText">Ready to borrow.</p>
        
        <button id="actionBtn" onclick="performAction()" class="btn btn-primary w-full">
          Borrow Item
        </button>
        <button onclick="clearSelection()" class="btn btn-secondary w-full mt-2 text-sm">
          Cancel
        </button>
      </div>
    </div>

    <!-- Right: Inventory & Activity -->
    <div class="lg:col-span-2">
      <div class="glass overflow-hidden">
        <!-- Tabs -->
        <div class="flex border-b border-slate-700">
          <button onclick="switchTab('inv')" id="tabInv" class="flex-1 py-3 text-sm font-semibold border-b-2 border-emerald-500 text-emerald-400">Inventory</button>
          <button onclick="switchTab('act')" id="tabAct" class="flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-400 hover:text-white">Activity Log</button>
        </div>

        <!-- Inventory List -->
        <div id="invPanel" class="p-4 overflow-x-auto max-h-[65vh] overflow-y-auto">
          <table class="w-full text-sm">
            <thead class="text-slate-400 text-xs uppercase border-b border-slate-700 sticky top-0 bg-slate-800">
              <tr>
                <th class="text-left p-3">ID</th>
                <th class="text-left p-3">Item</th>
                <th class="text-left p-3">Status</th>
                <th class="text-left p-3">Holder</th>
              </tr>
            </thead>
            <tbody id="invBody">
              <tr><td colspan="4" class="p-8 text-center text-slate-500">Loading data...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Activity List -->
        <div id="actPanel" class="p-4 overflow-x-auto max-h-[65vh] overflow-y-auto hidden">
          <table class="w-full text-sm">
            <thead class="text-slate-400 text-xs uppercase border-b border-slate-700 sticky top-0 bg-slate-800">
              <tr>
                <th class="text-left p-3">Time</th>
                <th class="text-left p-3">User</th>
                <th class="text-left p-3">Item</th>
                <th class="text-left p-3">Action</th>
              </tr>
            </thead>
            <tbody id="actBody">
              <tr><td colspan="4" class="p-8 text-center text-slate-500">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // STATE
    // ==========================================
    let scanner = null;
    let isScanning = false;
    let currentUser = null;
    let selectedItemId = null;
    let inventoryCache = [];

    // Initialize on load
    document.addEventListener('DOMContentLoaded', init);

    function init() {
      google.script.run.withSuccessHandler(onUserLoaded).getUser();
      refreshData();
    }

    function onUserLoaded(user) {
      currentUser = user;
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userEmail').textContent = user.email;
    }

    // ==========================================
    // DATA HANDLING
    // ==========================================
    function refreshData() {
      google.script.run.withSuccessHandler(onInventoryLoaded).getInventory();
      google.script.run.withSuccessHandler(onActivityLoaded).getActivity();
    }

    function onInventoryLoaded(items) {
      inventoryCache = items;
      const tbody = document.getElementById('invBody');
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500">No items found. Add them in the Google Sheet.</td></tr>';
        return;
      }
      
      tbody.innerHTML = items.map(item => `
        <tr class="border-b border-slate-800 hover:bg-slate-800/50 cursor-pointer" onclick="selectItem('${item.id}')">
          <td class="p-3 mono text-slate-400">${item.id}</td>
          <td class="p-3 font-medium">${item.name}</td>
          <td class="p-3"><span class="status-badge ${item.status}">${item.status}</span></td>
          <td class="p-3 text-slate-400 text-xs">${item.holder || '-'}</td>
        </tr>
      `).join('');
    }

    function onActivityLoaded(logs) {
      const tbody = document.getElementById('actBody');
      if (!logs.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500">No activity yet.</td></tr>';
        return;
      }
      
      tbody.innerHTML = logs.map(log => `
        <tr class="border-b border-slate-800">
          <td class="p-3 text-xs text-slate-400">${new Date(log.timestamp).toLocaleString()}</td>
          <td class="p-3 text-xs">${log.user}</td>
          <td class="p-3">${log.itemName}</td>
          <td class="p-3"><span class="status-badge ${log.action === 'RETURN' ? 'available' : 'borrowed'}">${log.action}</span></td>
        </tr>
      `).join('');
    }

    // ==========================================
    // SCANNER
    // ==========================================
    function toggleScanner() {
      const btn = document.getElementById('scanBtn');
      const placeholder = document.getElementById('scanner-placeholder');
      
      if (isScanning) {
        scanner.stop();
        isScanning = false;
        btn.innerText = "Start Scanner";
        btn.classList.remove('btn-danger');
        btn.classList.add('btn-primary');
        placeholder.classList.remove('hidden');
      } else {
        placeholder.classList.add('hidden');
        scanner = new Html5Qrcode("qr-reader");
        scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScanSuccess,
          () => {} // Ignore scan failures
        ).then(() => {
          isScanning = true;
          btn.innerText = "Stop Scanner";
          btn.classList.add('btn-danger');
          btn.classList.remove('btn-primary');
        }).catch(err => {
          alert("Camera Access Denied or Error: " + err);
          placeholder.classList.remove('hidden');
        });
      }
    }

    function onScanSuccess(decodedText) {
      // Stop scanner after success
      scanner.stop();
      isScanning = false;
      document.getElementById('scanBtn').innerText = "Start Scanner";
      document.getElementById('scanBtn').classList.remove('btn-danger');
      document.getElementById('scanBtn').classList.add('btn-primary');
      document.getElementById('scanner-placeholder').classList.remove('hidden');
      
      processItem(decodedText);
    }

    function submitManual() {
      const id = document.getElementById('manualId').value.trim().toUpperCase();
      if (id) processItem(id);
      document.getElementById('manualId').value = '';
    }

    // ==========================================
    // ACTIONS
    // ==========================================
    function processItem(id) {
      selectedItemId = id;
      // Check against local cache first for speed, then update UI
      const item = inventoryCache.find(i => i.id.toUpperCase() === id.toUpperCase());
      
      if (!item) {
        alert("Item ID '" + id + "' not found in inventory.");
        selectedItemId = null;
        return;
      }
      
      updateActionCard(item);
    }
    
    function selectItem(id) {
      processItem(id);
    }

    function updateActionCard(item) {
      const card = document.getElementById('actionCard');
      document.getElementById('itemName').innerText = item.name;
      document.getElementById('itemId').innerText = item.id;
      
      const badge = document.getElementById('itemStatusBadge');
      const btn = document.getElementById('actionBtn');
      const statusText = document.getElementById('itemStatusText');

      if (item.status === 'available') {
        badge.className = 'status-badge available';
        badge.innerText = 'Available';
        statusText.innerText = 'This item is ready to be borrowed.';
        btn.innerText = 'Borrow Item';
        btn.className = 'btn btn-primary w-full';
        btn.disabled = false;
      } else if (item.holder === currentUser.email) {
        badge.className = 'status-badge borrowed';
        badge.innerText = 'Borrowed by You';
        statusText.innerText = 'You are currently holding this item.';
        btn.innerText = 'Return Item';
        btn.className = 'btn btn-danger w-full';
        btn.disabled = false;
      } else {
        badge.className = 'status-badge borrowed';
        badge.innerText = 'Unavailable';
        statusText.innerText = Borrowed by: ${item.holder};
        btn.innerText = 'Cannot Borrow';
        btn.className = 'btn bg-slate-600 text-slate-400 w-full cursor-not-allowed';
        btn.disabled = true;
      }

      card.classList.remove('hidden');
    }

    function performAction() {
      if (!selectedItemId) return;
      
      const btn = document.getElementById('actionBtn');
      btn.innerText = 'Processing...';
      btn.disabled = true;

      google.script.run
        .withSuccessHandler(onActionSuccess)
        .withFailureHandler(onActionFail)
        .processTransaction(selectedItemId);
    }

    function onActionSuccess(result) {
      alert(result.message);
      clearSelection();
      refreshData();
    }

    function onActionFail(error) {
      alert("Error: " + error.message);
      clearSelection();
    }
    
    function clearSelection() {
      document.getElementById('actionCard').classList.add('hidden');
      selectedItemId = null;
    }

    // ==========================================
    // UI TABS
    // ==========================================
    function switchTab(tab) {
      document.getElementById('invPanel').classList.toggle('hidden', tab !== 'inv');
      document.getElementById('actPanel').classList.toggle('hidden', tab !== 'act');
      
      const tabInv = document.getElementById('tabInv');
      const tabAct = document.getElementById('tabAct');
      
      if (tab === 'inv') {
        tabInv.classList.add('border-emerald-500', 'text-emerald-400');
        tabInv.classList.remove('border-transparent', 'text-slate-400');
        tabAct.classList.remove('border-emerald-500', 'text-emerald-400');
        tabAct.classList.add('border-transparent', 'text-slate-400');
      } else {
        tabAct.classList.add('border-emerald-500', 'text-emerald-400');
        tabAct.classList.remove('border-transparent', 'text-slate-400');
        tabInv.classList.remove('border-emerald-500', 'text-emerald-400');
        tabInv.classList.add('border-transparent', 'text-slate-400');
      }
    }
  </script>
</body>

</html>
